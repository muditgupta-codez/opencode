name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-2025-arm' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Build
        run: bun run build
        working-directory: packages/desktop

      - name: Package
        run: npx electron-builder --win ${{ matrix.arch == 'arm64' && '--arm64' || '' }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: forge-studio-windows-${{ matrix.arch }}
          path: packages/desktop/dist/*
