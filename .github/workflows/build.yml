name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORGE_STUDIO_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      is_release: ${{ steps.set-version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
      - id: set-version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-2025-arm' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Set version
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "${{ needs.version.outputs.version }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
        working-directory: packages/desktop

      - name: Build
        run: bun run build
        working-directory: packages/desktop

      - name: Package
        run: npx electron-builder --win ${{ matrix.arch == 'arm64' && '--arm64' || '' }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: forge-studio-windows-${{ matrix.arch }}
          path: packages/desktop/dist/*

  build-macos:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'macos-latest' || 'macos-13' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Set version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.version.outputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        working-directory: packages/desktop

      - name: Build
        run: bun run build
        working-directory: packages/desktop

      - name: Package
        run: npx electron-builder --mac ${{ matrix.arch == 'x64' && '--x64' || '--arm64' }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: forge-studio-macos-${{ matrix.arch }}
          path: packages/desktop/dist/*

  build-linux:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24-core-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install rpm
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Set version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.version.outputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        working-directory: packages/desktop

      - name: Build
        run: bun run build
        working-directory: packages/desktop

      - name: Package
        run: npx electron-builder --linux ${{ matrix.arch == 'arm64' && '--arm64' || '' }} --publish never --config electron-builder.config.ts
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: forge-studio-linux-${{ matrix.arch }}
          path: packages/desktop/dist/*

  release:
    if: needs.version.outputs.is_release == 'true'
    needs: [version, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: forge-studio-*
          merge-multiple: true
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
